context:
  version: "0.11.0"

package:
  name: tibs
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tibs/tibs-${{ version }}.tar.gz
  sha256: 1873b11bc6d2a2fcdb78eb4838f11bcaa7a476c4ad2f44f192c8606591e428ec

build:
  number: 0
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - python -m pip install . -vv

requirements:
  build:
    - if: build_platform != host_platform
      then:
        - python
        - cross-python_${{ host_platform }}
        - maturin >=1.11.5,<2.0
        - pip
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
  host:
    - maturin >=1.11.5,<2.0
    - python
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - tibs
      pip_check: true
  - script:
      - python -c "from tibs import Tibs, Mutibs"

about:
  homepage: https://github.com/scott-griffiths/tibs
  summary: 'A sleek Python library for binary data.'
  license: MIT
  license_file:
    - THIRDPARTY.yml
    - LICENSE
  documentation: https://mutibs.readthedocs.io
  repository: https://github.com/scott-griffiths/tibs

extra:
  recipe-maintainers:
    - m-rossi
