context:
  version: "0.5.7"

package:
  name: tibs
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/t/tibs/tibs-${{ version }}.tar.gz
  sha256: 173dfbecb2309edd9771f453580c88cf251e775613461566b23dbd756b3d54cb

build:
  number: 0
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - python -m pip install . -vv

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses
  host:
    - maturin >=1.11.5,<2.0
    - python
    - pip
  run:
    - python

tests:
  - python:
      imports:
        - tibs
      pip_check: true
  - script:
      - python -c "from tibs import Tibs, Mutibs"

about:
  homepage: https://github.com/scott-griffiths/tibs
  summary: 'A sleek Python library for binary data.'
  license: MIT
  license_file:
    - THIRDPARTY.yml
    - LICENSE
  documentation: https://mutibs.readthedocs.io
  repository: https://github.com/scott-griffiths/tibs

extra:
  recipe-maintainers:
    - m-rossi
